simulation:
  population_size: 50
  settlement:
    location_id: river_valley
    name: Threaded River Valley
    symbolic_description: A single early agrarian settlement beside a braided river, with gardens, reed beds, fishing shallows, and shared work spaces.
  starting_resources:
    grain_per_household: 18
    fish_per_household: 6
    reeds_per_household: 5
    tools_per_household: 3
  household:
    min_size: 3
    max_size: 6
  decision:
    conflict_threshold: 0.72
    cooperation_threshold: 0.58
    memory_salience_threshold: 0.62
  upkeep:
    daily_food_need_per_agent: 1.0
    food_shortage_memory_threshold: 1.0
    material_decay_enabled: false
    material_decay_per_household: 0.0
  propagation:
    propagation_enabled: true
    propagation_max_observers: 5
    propagation_max_events_per_tick: 80
    propagation_max_memories_per_tick: 80
    propagation_min_source_event_importance: 0.55
    propagation_cooldown_per_observer_subject_pair: false
    propagation_strength: 0.2
    propagation_min_relationship_threshold: 0.62
    propagation_create_memories: true
    propagation_memory_salience_multiplier: 0.45
  roles:
    role_influence_enabled: true
    role_influence_min_score: 0.45
    role_influence_max_adjustment: 0.08
    role_influence_relevant_actions_only: true
  norms:
    norm_influence_enabled: false
    norm_influence_strength: 0.02
    norm_min_agents_for_stable: 3
    norm_min_households_for_stable: 2
    norm_repeated_actor_diminishing_factor: 0.35
    norm_repeated_household_diminishing_factor: 0.65
    norm_stability_support_threshold: 1.2
    norm_decline_threshold: 0.35
  diagnostics:
    diagnostics_enabled: true
    runaway_growth_ratio_threshold: 2.5
    collapse_ratio_threshold: 0.35
    saturation_high_threshold: 0.92
    saturation_low_threshold: 0.08
    flatline_window_ticks: 8
    min_activity_threshold: 1
    conflict_rate_warning_threshold: 4.0
    propagation_rate_warning_threshold: 85.0
    shortage_rate_warning_threshold: 0.35

archetypes:
  - cultivator
  - gatherer
  - fisher
  - hunter
  - craft worker
  - healer
  - elder
  - storyteller
  - builder
  - trader
  - apprentice
